<div class="col-md-3">
    <div class="card game-card">
        <div class="card-body">
            <h5 class="card-title">{{name}}</h5>
            <h6 class="card-subtitle mb-2 text-muted">{{mechanics}}</h6>
            <p class="card-text">
                <strong>Price:</strong> R${{price_base}} ({{price_category}})<br>
                <strong>Players:</strong> {{min_players}}-{{max_players}}<br>
                <strong>Duration:</strong> {{playtime}}min<br>
                <strong>Complexity:</strong> {{complexity}}/5
            </p>
            <button class="btn btn-primary rent-now-btn" data-game='{{game}}'>Rent Now</button>
        </div>
    </div>
</div>
