<output id="output"></output>
<!-- https://www.jsdelivr.com/package/npm/markdown -->
<script src="https://cdn.jsdelivr.net/npm/markdown@0.5.0/lib/markdown.min.js"></script>

<script>
	const output = document.getElementById('output');
	(async () => {
		const temperature = 1;
		const topK = 3;

		const initialPrompts = [
			{
				role: 'system',
				content:
					'Você é um assistente de IA que responde de forma clara e objetiva.',
			},
		];

		const question = 'quem inventou o relógio de pulso?';
    output.innerHTML = "Gerando resposta...";

		const session = await LanguageModel.create({
			expectedInputLanguages: ['pt'],
			expectedOutputLanguages: ['pt'],
			temperature,
			topK,
			initialPrompts,
		});

		const responseStream = await session.promptStreaming([
			{
				role: 'user',
				content: question,
			},
		]);

    let fullResponse = '';
		for await (const token of responseStream) {
			console.log(token);
      fullResponse += token;
      output.innerHTML = markdown.toHTML(fullResponse);
		}
	})();
</script>
